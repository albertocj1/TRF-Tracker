<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Inbox – CrowdSource</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f4f5f7; color: #1a1a2e; }
  
  .topbar { background: #1a1a2e; padding: 0 28px; height: 70px; display: flex; align-items: center; }
  .logo-text { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: .5px; }
  .logo-text span { color: #64b5f6; }
  
  .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
  .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
  .page-title { font-size: 24px; font-weight: 700; }
  .page-subtitle { color: #6b7280; font-size: 14px; margin-top: 4px; }
  
  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.07); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; text-align: left; }
  th { background: #fafbfc; color: #9ca3af; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 14px 20px; border-bottom: 1px solid #e5e7eb; }
  td { padding: 16px 20px; font-size: 14px; border-bottom: 1px solid #e5e7eb; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: #f9fafb; }
  
  .badge { background: #fff8e1; color: #b45309; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
  .btn-review { background: #e8f0fe; color: #1565c0; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 13px; display: inline-block; transition: 0.2s; }
  .btn-review:hover { background: #1565c0; color: #fff; }
  
  .empty-state { text-align: center; padding: 60px 20px; color: #6b7280; }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo-text"><span>CROWD</span>SOURCE HR INBOX</div>
</header>

<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title">Pending Approvals</div>
      <div class="page-subtitle">Timesheets submitted by the end user awaiting your review.</div>
    </div>
    <button onclick="loadQueue()" style="padding: 8px 16px; border-radius: 6px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; font-family: inherit; font-weight: 500;">Refresh Inbox</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Payroll Period</th>
          <th>Cutoff Range</th>
          <th>Status</th>
          <th style="text-align:right">Action</th>
        </tr>
      </thead>
      <tbody id="queueBody">
        <tr><td colspan="4" class="empty-state">Loading pending items...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const HR_GET_SUBMITTED_URL = 'https://primary-production-a810.up.railway.app/webhook/hr-get-user-submitted';
  const COMPANY = 'CISI';
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  async function loadQueue() {
    const tbody = document.getElementById('queueBody');
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Fetching pending cutoffs...</td></tr>';
    try {
      const res = await fetch(HR_GET_SUBMITTED_URL + '?company=' + COMPANY);
      const data = await res.json();
      const rows = data.result || [];
      
      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">You are all caught up! No pending approvals.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(r => {
        // Convert month string "March" to number "3" for the URL
        const monthNum = MONTHS.indexOf(r.month) + 1;
        // Build the URL to pass the data to your timesheet page
        const link = `timesheet.html?cutoff=${r.cutoff}&month=${monthNum}&year=${r.year}`;

        return `
        <tr>
          <td><strong>${r.month} ${r.year}</strong></td>
          <td>${r.cutoff === 'Q1' ? 'Cutoff 1 (1st–15th)' : 'Cutoff 2 (16th–EOM)'}</td>
          <td><span class="badge">Pending Review</span></td>
          <td style="text-align:right"><a href="${link}" class="btn-review">Open Timesheet</a></td>
        </tr>
        `;
      }).join('');
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-state" style="color:red;">Error loading queue.</td></tr>';
    }
  }

  loadQueue();
</script>
</body>
</html>
